<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <div class="logo">NWU Support Hub</div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="support.html">Support Services</a></li>
            <li><a href="campus.html">Campus Guide</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="contact-section">

    <h1>Contact Support</h1>

    <form id="contactForm">

        <input type="text" id="name" placeholder="Your Name">

        <input type="email" id="email" placeholder="Your Email">

        <textarea id="message" placeholder="Your Message"></textarea>

        <button type="submit">Send Message</button>

        <p id="formMessage"></p>

    </form>

</section>

<section class="faq-section">

    <h2>Frequently Asked Questions</h2>

    <div class="faq-item">
        <button class="faq-question">How do I access student counselling?</button>
        <div class="faq-answer">
            <p>You can contact the student wellness centre on campus.</p>
        </div>
    </div>

    <div class="faq-item">
        <button class="faq-question">Where can I get academic tutoring?</button>
        <div class="faq-answer">
            <p>Visit the academic support centre for tutoring assistance.</p>
        </div>
    </div>

</section>

<footer>
    <p>© 2026 NWU Student Support Hub</p>
</footer>

<script src="script.js"></script>
</body>
</html>
